name: Build Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configurer Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Décoder le keystore (si le secret existe)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$GITHUB_WORKSPACE/keystore.jks"
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> "$GITHUB_ENV"
            echo "Keystore décodé : la release sera signée."
          else
            echo "Aucun secret KEYSTORE_BASE64 : la release sera non signée."
          fi

      - name: Compiler l'APK release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Publier l'APK release
        uses: actions/upload-artifact@v4
        with:
          name: pdf-empire-release-apk
          path: app/build/outputs/apk/release/*.apk
